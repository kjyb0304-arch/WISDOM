<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오 로그인 처리 중...</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #0a1628;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            text-align: center;
        }
        .kakao-icon {
            width: 60px;
            height: 60px;
            background: #FEE500;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 30px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #FEE500;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div>
        <div class="kakao-icon">💬</div>
        <h2>로그인 처리 중...</h2>
        <div class="spinner"></div>
        <p>잠시만 기다려주세요</p>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');

        if (error) {
            alert('로그인이 취소되었습니다.');
            window.location.href = '/WISDOM/';
        } else if (code) {
            sessionStorage.setItem('kakao_logged_in', 'true');
            sessionStorage.setItem('kakao_nickname', '회원');
            setTimeout(() => {
                window.location.href = '/WISDOM/';
            }, 1000);
        } else {
            window.location.href = '/WISDOM/';
        }
    </script>
</body>
</html>
